kotlin.code.style=official

# Allow platform.posix (and other cinterop libs) to be used in intermediate
# native source sets such as unixMain.  Without this, the metadata compilation
# for unixMain cannot resolve pthread_* symbols.
kotlin.mpp.enableCInteropCommonization=true

org.gradle.jvmargs=-Xmx1g -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true
